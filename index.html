<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kanban Board</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container-fluid overflow-x-hidden text-center px-4">
      <h1 class="heading">Kanban Board</h1>

      <button type="button" id="modeButton" class="mode-button btn btn-light">
        Light 🌞
      </button>

      <div class="boards">
        <div id="pendingBoard" class="pending board">
          <h4>Pending</h4>
        </div>

        <div id="progressBoard" class="progress board">
          <h4>In-Progress</h4>
        </div>

        <div id="completedBoard" class="completed board">
          <h4>Completed</h4>
        </div>
      </div>

    </div>

    <script
      defer
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
      crossorigin="anonymous"
    ></script>
    <script src="script.js" defer></script>
  </body>
</html>
